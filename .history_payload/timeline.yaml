  commit_msg: Implement 64-bit extraction FSM (v002)
- id: ev04
  title: VLAN Tag Alignment Bug
  issue:
    title: Parser alignment incorrect after VLAN tag
    description: Packet parsing fails when 802.1Q VLAN headers are present due to
      static offsets.
  artifacts: []
  commit_msg: Add dynamic offset FSM for VLAN skipping
- id: ev05
  title: Parser Checksum Verification
  issue:
    title: IPv4 Checksum offload missing
    description: The parser does not validate the IP header checksum, allowing corrupt
      packets.
  artifacts:
  - src: flattened/ev04/rtl/ha_tff_hash_v001.v
    dst: rtl/ha_tff_hash_v001.v
