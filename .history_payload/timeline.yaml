events:
  - id: v001
    title: MeghDut Baseline to FPGA (v001)
    issue:
      title: Software forwarding latency unacceptable for 10GbE
      description: Linux network stack introduces latency in the microsecond range. We must migrate datapath to FPGA.
    commit_msg: "Initialize FPGA datapath (v001)"

  - id: v002
    title: 64-bit Parser Implementation (v002)
    issue:
      title: 8-bit parser fails timing
      description: 1-byte parser cannot sustain 10GbE.
    commit_msg: "Implement 64-bit extraction FSM (v002)"

  - id: v003
    title: Exact Match Pipeline (v003)
    issue:
      title: Basic exact match lacks scalability
      description: Need structured memory access.
    commit_msg: "Implement structured tuple matcher (v003)"

  - id: v004
    title: Pipelined Tuple Matcher (v004)
    issue:
      title: Matcher timing failure
      description: Combinatorial match too deep.
    commit_msg: "Pipeline tuple matcher (v004)"

  - id: v005
    title: Cuckoo Hash Architecture (v005)
    issue:
      title: Hash collisions dropping traffic
      description: Direct map hash tables collide frequently.
    adr:
      id: "ADR-014"
      title: "Use 4-way Cuckoo Hashing"
      content: "Use 4 independent BRAM banks."
    commit_msg: "Establish Cuckoo Hash architecture (v005)"

  - id: v006
    title: BRAM Bank Integration (v006)
    issue:
      title: Connect Cuckoo Hash
      description: Memory banks not attached to datapath.
    commit_msg: "Integrate 4-way BRAM banks (v006)"

  - id: v007
    title: SNN Coprocessor Concept (v007)
    issue:
      title: Static rules fail against anomalies
      description: Cannot detect zero-day attacks.
    commit_msg: "Implement feature to spike encoder (v007)"

  - id: v008
    title: LIF Neuron Implementation (v008)
    issue:
      title: Spikes need integration
      description: Construct the Leaky Integrate and Fire neuron.
    commit_msg: "Implement LIF neuron logic (v008)"

  - id: v009
    title: SNN Timing Closure Failure (v009)
    issue:
      title: SNN Adder Tree fails 6.4ns timing
      description: WNS is -0.465ns. 8-way addition takes too long.
    commit_msg: "Pipeline LIF neuron into Arithmetic/Threshold (v009)"

  - id: v010
    title: SNN Datapath Integration (v010)
    issue:
      title: Attach SNN to parallel processing
      description: Route SNN spikes alongside exact match.
    commit_msg: "Integrate SNN with main datapath (v010)"

  - id: v011
    title: Datapath Delay Line (v011)
    issue:
      title: SNN desynchronizes packet stream
      description: Must buffer original packet while SNN evaluates.
    commit_msg: "Implement AXI-Stream delay line using SRL16E (v011)"

  - id: v012
    title: Cuckoo Table Eviction Logic (v012)
    issue:
      title: Cuckoo tables locking up on insert
      description: Need eviction and rehash FSM for Cuckoo writes.
    commit_msg: "Implement Cuckoo table eviction FSM (v012)"

  - id: v013
    title: Dynamic AI Weights and Secure Hash (v013 Release)
    issue:
      title: Hardcoded weights and vulnerable static hash
      description: AI weights are ROM. Hash uses static XOR.
    commit_msg: "Implement AXI-Lite Register File and Toeplitz Hash (v013)"
