- id: ev02
  title: 8-bit Parser Throughput Failure
  issue:
    title: 8-bit parser fails timing
    description: 1-byte parser cannot sustain 10GbE (requires >1.25 GHz clock).
  artifacts: []
  commit_msg: Document 8-bit parser timing failure
- id: ev03
  title: 64-bit Extraction FSM
  issue:
    title: Implement 64-bit width parsing
    description: We need to parse 8 bytes per cycle at 156.25MHz.
  artifacts:
