name: HA-TFF Autonomous Engineering Engine
on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  simulate_engineering:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Ensure Full History (unshallow if needed)
        run: git rev-list --all --count automation/state.json || git fetch --unshallow

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Configure Git
        run: |
          git config --global user.name "Ganeshkumara26"
          git config --global user.email "hosakotaganeshkumara.me@gmail.com"

      - name: Run Orchestrator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .scripts/github_action_orchestrator.py
